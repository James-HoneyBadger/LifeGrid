name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-executables:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: lifegrid-linux
          - os: windows-latest
            asset_name: lifegrid-windows.exe
          - os: macos-latest
            asset_name: lifegrid-macos

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install Linux GUI dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libxkbcommon-dev \
          libwayland-dev \
          libasound2-dev \
          libudev-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build executable
      run: |
        cargo build --release --manifest-path lifegrid-rs/Cargo.toml

    - name: Package executable
      shell: bash
      run: |
        mkdir -p dist
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          cp lifegrid-rs/target/release/lifegrid.exe "dist/${{ matrix.asset_name }}"
        else
          cp lifegrid-rs/target/release/lifegrid "dist/${{ matrix.asset_name }}"
        fi

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.asset_name }}

  upload-executables:
    name: Upload Executables to Release
    runs-on: ubuntu-latest
    needs: [build-executables]

    steps:
    - name: Download Linux executable
      uses: actions/download-artifact@v4
      with:
        name: lifegrid-linux
        path: ./executables/

    - name: Download Windows executable
      uses: actions/download-artifact@v4
      with:
        name: lifegrid-windows.exe
        path: ./executables/

    - name: Download macOS executable
      uses: actions/download-artifact@v4
      with:
        name: lifegrid-macos
        path: ./executables/

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./executables/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
