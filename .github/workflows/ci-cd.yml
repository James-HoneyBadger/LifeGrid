name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libxkbcommon-dev \
          libwayland-dev \
          libasound2-dev \
          libudev-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo check
      run: cargo check --manifest-path lifegrid-rs/Cargo.toml

    - name: Cargo test
      run: cargo test --manifest-path lifegrid-rs/Cargo.toml -- --nocapture

  ts-check:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm --prefix lifegrid-ts install

    - name: Run TypeScript tests
      run: npm --prefix lifegrid-ts run test

    - name: Build TypeScript app
      run: npm --prefix lifegrid-ts run build

  build:
    name: Build Rust Binary
    runs-on: ubuntu-latest
    needs: [rust-check, ts-check]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install Linux GUI dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libxkbcommon-dev \
          libwayland-dev \
          libasound2-dev \
          libudev-dev

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build release binary
      run: cargo build --release --manifest-path lifegrid-rs/Cargo.toml

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lifegrid-linux-release
        path: lifegrid-rs/target/release/lifegrid
